server.port=${PORT:8083}
spring.application.name=ai-service

eureka.client.enabled=false

jwt.secret=${JWT_SECRET}

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
openai.model=${OPENAI_MODEL:gemini-2.0-flash}
openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:60}
openai.response-format-enabled=${OPENAI_RESPONSE_FORMAT_ENABLED:true}
