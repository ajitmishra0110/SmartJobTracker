spring.config.import=optional:file:../.env[.properties]

server.port=8083
spring.application.name=ai-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
openai.model=${OPENAI_MODEL:gemini-3.5-flash}
openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:30}
openai.response-format-enabled=${OPENAI_RESPONSE_FORMAT_ENABLED:true}
