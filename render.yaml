# Render Blueprint — deploy all backend services + PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: smartjobtracker-db
    plan: free
    databaseName: smartjobtracker
    user: smartjobtracker

services:
  - type: web
    name: sjt-auth
    runtime: docker
    plan: free
    dockerfilePath: ./smartJobTracker/Dockerfile
    dockerContext: ./smartJobTracker
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_HOST
        fromDatabase:
          name: smartjobtracker-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: smartjobtracker-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: smartjobtracker-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: smartjobtracker-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: smartjobtracker-db
          property: password

  - type: web
    name: sjt-job
    runtime: docker
    plan: free
    dockerfilePath: ./job-service/Dockerfile
    dockerContext: ./job-service
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        fromService:
          name: sjt-auth
          type: web
          envVarKey: JWT_SECRET
      - key: DATABASE_HOST
        fromDatabase:
          name: smartjobtracker-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: smartjobtracker-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: smartjobtracker-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: smartjobtracker-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: smartjobtracker-db
          property: password

  - type: web
    name: sjt-ai
    runtime: docker
    plan: free
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        fromService:
          name: sjt-auth
          type: web
          envVarKey: JWT_SECRET
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: OPENAI_MODEL
        value: gemini-2.0-flash

  - type: web
    name: sjt-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AUTH_SERVICE_URL
        fromService:
          name: sjt-auth
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: JOB_SERVICE_URL
        fromService:
          name: sjt-job
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: AI_SERVICE_URL
        fromService:
          name: sjt-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOWED_ORIGINS
        sync: false
